name: Build LinkGuard Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # also lets you trigger it manually from GitHub website

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Get the code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install frontend packages ─────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ── 4. Build the React web app ───────────────────────────────────────────
      - name: Build web app
        working-directory: frontend
        run: npm run build

      # ── 5. Sync web assets into the Android project ──────────────────────────
      - name: Sync Capacitor → Android
        working-directory: frontend
        run: npx cap sync android

      # ── 6. JDK 17 (required by Android Gradle) ───────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 7. Android SDK ───────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 8. Make Gradle executable (Linux needs this) ─────────────────────────
      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      # ── 9. Build the debug APK ───────────────────────────────────────────────
      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 10. Upload APK so you can download it ────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LinkGuard-Android-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
