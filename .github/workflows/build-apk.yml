name: Build LinkGuard Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install frontend packages
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # 4. Build the React/Vite web app
      - name: Build web app
        working-directory: frontend
        run: npm run build

      # 5. Sync web assets into android project
      - name: Sync Capacitor to Android
        working-directory: frontend
        run: npx cap sync android

      # 6. JDK 17 (required by Gradle)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 7. Make gradlew executable (Linux requirement)
      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      # 8. Build debug APK
      - name: Build APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      # 9. Upload APK as downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LinkGuard-Android-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
